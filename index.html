<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title> </title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #010408;
      cursor: crosshair;
    }
    canvas {
      display: block;
      width: 100%;
      height: 100%;
    }
  </style>
</head>
<body>
  <canvas id="cosmos"></canvas>
  <script>
    const canvas = document.getElementById('cosmos');
    const ctx = canvas.getContext('2d');

    let width, height, cx, cy, dpr, maxDim;
    let audioStarted = false;
    let audioCtx = null;
    let masterGain = null;

    function resize() {
      dpr = Math.min(window.devicePixelRatio || 1, 2);
      width = window.innerWidth;
      height = window.innerHeight;
      maxDim = Math.max(width, height);
      canvas.width = width * dpr;
      canvas.height = height * dpr;
      canvas.style.width = width + 'px';
      canvas.style.height = height + 'px';
      ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
      cx = width / 2;
      cy = height / 2;
      initStars();
    }

    window.addEventListener('resize', resize);

    // --- Nebula wisps orbiting the core ---
    const wisps = Array.from({ length: 14 }, (_, i) => ({
      angle: (i / 14) * Math.PI * 2 + Math.random() * 0.5,
      dist: 0.05 + Math.random() * 0.22,
      radius: 0.12 + Math.random() * 0.28,
      speed: 0.00004 + Math.random() * 0.00006,
      hue: [195, 200, 205, 185, 175][i % 5],
      alpha: 0.04 + Math.random() * 0.06,
      phase: Math.random() * Math.PI * 2,
    }));

    // --- Static distant star field (depth backdrop) ---
    let bgStars = [];

    // --- Moving stars (slow drift toward viewer) ---
    let flowStars = [];

    function createFlowStar() {
      const angle = Math.random() * Math.PI * 2;
      const dist = Math.random() * 0.95;
      return {
        angle,
        dist,
        z: 0.15 + Math.random() * 0.85,
        speed: 0.00035 + Math.random() * 0.00055,
        size: 0.4 + Math.random() * 1.4,
        blue: Math.random() < 0.35,
        twinkle: Math.random() * Math.PI * 2,
      };
    }

    function initStars() {
      const area = width * height;
      bgStars = Array.from({ length: Math.floor(area / 900) }, () => ({
        x: Math.random() * width,
        y: Math.random() * height,
        size: Math.random() < 0.08 ? 1.4 + Math.random() * 1.2 : 0.3 + Math.random() * 0.9,
        alpha: 0.25 + Math.random() * 0.75,
        blue: Math.random() < 0.4,
        twinkle: Math.random() * Math.PI * 2,
      }));

      const flowCount = Math.floor(area / 1400);
      flowStars = Array.from({ length: flowCount }, createFlowStar);
    }

    resize();

    function drawBackground() {
      const g = ctx.createRadialGradient(cx, cy, 0, cx, cy, maxDim * 0.85);
      g.addColorStop(0, '#061828');
      g.addColorStop(0.25, '#041018');
      g.addColorStop(0.55, '#020810');
      g.addColorStop(1, '#000206');
      ctx.fillStyle = g;
      ctx.fillRect(0, 0, width, height);
    }

    function drawNebula(t) {
      ctx.save();
      ctx.globalCompositeOperation = 'screen';

      const pulse = 1 + Math.sin(t * 0.00025) * 0.06;

      // Outer cyan haze
      const outer = ctx.createRadialGradient(cx, cy, 0, cx, cy, maxDim * 0.55 * pulse);
      outer.addColorStop(0, 'rgba(80, 200, 255, 0.14)');
      outer.addColorStop(0.2, 'rgba(40, 140, 220, 0.10)');
      outer.addColorStop(0.45, 'rgba(20, 80, 160, 0.05)');
      outer.addColorStop(0.7, 'rgba(10, 40, 100, 0.02)');
      outer.addColorStop(1, 'rgba(0, 0, 0, 0)');
      ctx.fillStyle = outer;
      ctx.fillRect(0, 0, width, height);

      // Swirling wisps
      for (const w of wisps) {
        w.angle += w.speed;
        const wobble = Math.sin(t * 0.0003 + w.phase) * 0.04;
        const px = cx + Math.cos(w.angle) * w.dist * maxDim;
        const py = cy + Math.sin(w.angle) * w.dist * maxDim * 0.75;
        const r = w.radius * maxDim * (pulse + wobble);
        const neb = ctx.createRadialGradient(px, py, 0, px, py, r);
        neb.addColorStop(0, `hsla(${w.hue}, 90%, 65%, ${w.alpha * 1.6})`);
        neb.addColorStop(0.35, `hsla(${w.hue + 10}, 80%, 50%, ${w.alpha})`);
        neb.addColorStop(0.7, `hsla(${w.hue + 20}, 70%, 35%, ${w.alpha * 0.3})`);
        neb.addColorStop(1, 'rgba(0, 0, 0, 0)');
        ctx.fillStyle = neb;
        ctx.fillRect(px - r, py - r, r * 2, r * 2);
      }

      // Teal accents lower half
      const teal = ctx.createRadialGradient(cx, cy + maxDim * 0.12, 0, cx, cy, maxDim * 0.42);
      teal.addColorStop(0, 'rgba(30, 180, 200, 0.08)');
      teal.addColorStop(0.5, 'rgba(15, 100, 140, 0.04)');
      teal.addColorStop(1, 'rgba(0, 0, 0, 0)');
      ctx.fillStyle = teal;
      ctx.fillRect(0, 0, width, height);

      ctx.restore();
    }

    function drawCentralCore(t) {
      const pulse = 0.92 + Math.sin(t * 0.0005) * 0.08;
      const breathe = 0.96 + Math.sin(t * 0.00018) * 0.04;

      // Soft bloom
      const bloom = ctx.createRadialGradient(cx, cy, 0, cx, cy, maxDim * 0.38 * breathe);
      bloom.addColorStop(0, 'rgba(200, 240, 255, 0.55)');
      bloom.addColorStop(0.08, 'rgba(120, 200, 255, 0.28)');
      bloom.addColorStop(0.2, 'rgba(60, 150, 230, 0.12)');
      bloom.addColorStop(0.4, 'rgba(30, 90, 180, 0.04)');
      bloom.addColorStop(1, 'rgba(0, 0, 0, 0)');
      ctx.fillStyle = bloom;
      ctx.fillRect(0, 0, width, height);

      // Light rays
      ctx.save();
      ctx.translate(cx, cy);
      ctx.rotate(t * 0.00003);
      const rayCount = 16;
      for (let i = 0; i < rayCount; i++) {
        const a = (i / rayCount) * Math.PI * 2;
        const len = maxDim * (0.28 + (i % 3) * 0.06) * pulse;
        const ray = ctx.createLinearGradient(0, 0, Math.cos(a) * len, Math.sin(a) * len);
        ray.addColorStop(0, 'rgba(180, 230, 255, 0.18)');
        ray.addColorStop(0.15, 'rgba(100, 190, 255, 0.06)');
        ray.addColorStop(1, 'rgba(0, 0, 0, 0)');
        ctx.strokeStyle = ray;
        ctx.lineWidth = 2 + (i % 2);
        ctx.beginPath();
        ctx.moveTo(0, 0);
        ctx.lineTo(Math.cos(a) * len, Math.sin(a) * len);
        ctx.stroke();
      }
      ctx.restore();

      // Bright core
      const core = ctx.createRadialGradient(cx, cy, 0, cx, cy, maxDim * 0.07 * pulse);
      core.addColorStop(0, 'rgba(255, 255, 255, 0.95)');
      core.addColorStop(0.3, 'rgba(200, 240, 255, 0.5)');
      core.addColorStop(0.6, 'rgba(100, 180, 255, 0.15)');
      core.addColorStop(1, 'rgba(0, 0, 0, 0)');
      ctx.fillStyle = core;
      ctx.fillRect(0, 0, width, height);
    }

    function drawBackgroundStars(t) {
      for (const s of bgStars) {
        const tw = 0.7 + Math.sin(t * 0.0015 + s.twinkle) * 0.3;
        const a = s.alpha * tw;
        const color = s.blue
          ? `rgba(170, 210, 255, ${a})`
          : `rgba(230, 240, 255, ${a})`;
        ctx.fillStyle = color;
        ctx.beginPath();
        ctx.arc(s.x, s.y, s.size * 0.5, 0, Math.PI * 2);
        ctx.fill();
        if (s.size > 1.5) {
          const glow = ctx.createRadialGradient(s.x, s.y, 0, s.x, s.y, s.size * 2);
          glow.addColorStop(0, `rgba(180, 220, 255, ${a * 0.25})`);
          glow.addColorStop(1, 'rgba(0, 0, 0, 0)');
          ctx.fillStyle = glow;
          ctx.beginPath();
          ctx.arc(s.x, s.y, s.size * 2, 0, Math.PI * 2);
          ctx.fill();
        }
      }
    }

    function drawFlowStars(t) {
      const spread = Math.min(width, height) * 0.52;

      for (const s of flowStars) {
        s.z -= s.speed;
        if (s.z <= 0.02) {
          Object.assign(s, createFlowStar());
          s.z = 1;
        }

        const invZ = 1 / s.z;
        const sx = cx + Math.cos(s.angle) * s.dist * spread * invZ;
        const sy = cy + Math.sin(s.angle) * s.dist * spread * invZ;

        if (sx < -20 || sx > width + 20 || sy < -20 || sy > height + 20) continue;

        const depth = 1 - s.z;
        const tw = 0.65 + Math.sin(t * 0.002 + s.twinkle) * 0.35;
        const alpha = Math.min(0.95, depth * 0.85 + 0.08) * tw;
        const size = s.size * (0.3 + depth * 2.2) * invZ * 0.08;

        const tailLen = depth * 12 * s.speed * 800;
        const tx = sx - Math.cos(s.angle) * tailLen;
        const ty = sy - Math.sin(s.angle) * tailLen;

        if (depth > 0.25 && tailLen > 0.5) {
          const streak = ctx.createLinearGradient(tx, ty, sx, sy);
          const c = s.blue ? '190, 225, 255' : '240, 248, 255';
          streak.addColorStop(0, `rgba(${c}, 0)`);
          streak.addColorStop(1, `rgba(${c}, ${alpha * 0.5})`);
          ctx.strokeStyle = streak;
          ctx.lineWidth = Math.max(0.4, size * 0.6);
          ctx.beginPath();
          ctx.moveTo(tx, ty);
          ctx.lineTo(sx, sy);
          ctx.stroke();
        }

        const color = s.blue
          ? `rgba(180, 220, 255, ${alpha})`
          : `rgba(245, 250, 255, ${alpha})`;
        ctx.fillStyle = color;
        ctx.beginPath();
        ctx.arc(sx, sy, Math.max(0.35, size * 0.45), 0, Math.PI * 2);
        ctx.fill();
      }
    }

    function drawVignette() {
      const v = ctx.createRadialGradient(cx, cy, maxDim * 0.15, cx, cy, maxDim * 0.72);
      v.addColorStop(0, 'rgba(0, 0, 0, 0)');
      v.addColorStop(0.7, 'rgba(0, 2, 8, 0.25)');
      v.addColorStop(1, 'rgba(0, 0, 0, 0.65)');
      ctx.fillStyle = v;
      ctx.fillRect(0, 0, width, height);
    }

    function draw(t) {
      drawBackground();
      drawBackgroundStars(t);
      drawNebula(t);
      drawCentralCore(t);
      drawFlowStars(t);
      drawVignette();

      if (!audioStarted) {
        const pulse = 0.025 + Math.sin(t * 0.003) * 0.015;
        const g = ctx.createRadialGradient(cx, cy, 0, cx, cy, 36);
        g.addColorStop(0, `rgba(120, 200, 255, ${pulse})`);
        g.addColorStop(1, 'rgba(120, 200, 255, 0)');
        ctx.fillStyle = g;
        ctx.beginPath();
        ctx.arc(cx, cy, 36, 0, Math.PI * 2);
        ctx.fill();
      }
    }

    function frame(t) {
      draw(t);
      requestAnimationFrame(frame);
    }

    requestAnimationFrame(frame);

    const MASTER_VOLUME = 1;

    function startAudio() {
      if (audioStarted) return;
      audioCtx = new (window.AudioContext || window.webkitAudioContext)();

      masterGain = audioCtx.createGain();
      masterGain.gain.setValueAtTime(0, audioCtx.currentTime);
      masterGain.gain.linearRampToValueAtTime(MASTER_VOLUME, audioCtx.currentTime + 4);
      masterGain.connect(audioCtx.destination);

      const compressor = audioCtx.createDynamicsCompressor();
      compressor.threshold.value = -18;
      compressor.knee.value = 18;
      compressor.ratio.value = 3;
      compressor.attack.value = 0.01;
      compressor.release.value = 0.3;

      const masterFilter = audioCtx.createBiquadFilter();
      masterFilter.type = 'lowpass';
      masterFilter.frequency.value = 3200;
      masterFilter.Q.value = 0.4;
      masterFilter.connect(compressor);
      compressor.connect(masterGain);

      const droneNotes = [55, 82.41, 110, 164.81];
      droneNotes.forEach((freq, i) => {
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        const lfo = audioCtx.createOscillator();
        const lfoGain = audioCtx.createGain();

        osc.type = i % 2 === 0 ? 'sine' : 'triangle';
        osc.frequency.value = freq;
        gain.gain.value = 0.085 / (i + 1);

        lfo.frequency.value = 0.03 + i * 0.01;
        lfoGain.gain.value = 3 + i;
        lfo.connect(lfoGain);
        lfoGain.connect(osc.frequency);
        lfo.start();

        osc.connect(gain);
        gain.connect(masterFilter);
        osc.start();
      });

      const padOsc = audioCtx.createOscillator();
      const padGain = audioCtx.createGain();
      const padFilter = audioCtx.createBiquadFilter();
      padOsc.type = 'sawtooth';
      padOsc.frequency.value = 220;
      padFilter.type = 'lowpass';
      padFilter.frequency.value = 400;
      padGain.gain.value = 0.04;
      padOsc.connect(padFilter);
      padFilter.connect(padGain);
      padGain.connect(masterFilter);
      padOsc.start();

      const padLfo = audioCtx.createOscillator();
      const padLfoGain = audioCtx.createGain();
      padLfo.frequency.value = 0.05;
      padLfoGain.gain.value = 80;
      padLfo.connect(padLfoGain);
      padLfoGain.connect(padFilter.frequency);
      padLfo.start();

      const arpNotes = [220, 261.63, 329.63, 392, 329.63, 261.63];
      let arpIndex = 0;

      function playArpNote() {
        const freq = arpNotes[arpIndex % arpNotes.length];
        arpIndex++;

        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        const filter = audioCtx.createBiquadFilter();

        osc.type = 'sine';
        osc.frequency.value = freq;
        filter.type = 'lowpass';
        filter.frequency.value = 1200;

        const now = audioCtx.currentTime;
        gain.gain.setValueAtTime(0, now);
        gain.gain.linearRampToValueAtTime(0.075, now + 0.8);
        gain.gain.exponentialRampToValueAtTime(0.001, now + 5);

        osc.connect(filter);
        filter.connect(gain);
        gain.connect(masterFilter);

        osc.start(now);
        osc.stop(now + 5.5);

        setTimeout(playArpNote, 2800 + Math.random() * 1200);
      }

      setTimeout(playArpNote, 1500);

      const bufferSize = audioCtx.sampleRate * 2;
      const noiseBuffer = audioCtx.createBuffer(1, bufferSize, audioCtx.sampleRate);
      const data = noiseBuffer.getChannelData(0);
      for (let i = 0; i < bufferSize; i++) {
        data[i] = (Math.random() * 2 - 1) * 0.5;
      }

      const noise = audioCtx.createBufferSource();
      noise.buffer = noiseBuffer;
      noise.loop = true;

      const noiseFilter = audioCtx.createBiquadFilter();
      noiseFilter.type = 'bandpass';
      noiseFilter.frequency.value = 180;
      noiseFilter.Q.value = 0.8;

      const noiseGain = audioCtx.createGain();
      noiseGain.gain.value = 0.028;

      const noiseLfo = audioCtx.createOscillator();
      const noiseLfoGain = audioCtx.createGain();
      noiseLfo.frequency.value = 0.08;
      noiseLfoGain.gain.value = 60;
      noiseLfo.connect(noiseLfoGain);
      noiseLfoGain.connect(noiseFilter.frequency);
      noiseLfo.start();

      noise.connect(noiseFilter);
      noiseFilter.connect(noiseGain);
      noiseGain.connect(masterFilter);
      noise.start();

      audioStarted = true;
    }

    function toggleAudio() {
      if (!audioStarted) {
        startAudio();
      } else if (audioCtx && masterGain) {
        const muted = masterGain.gain.value < 0.01;
        const now = audioCtx.currentTime;
        masterGain.gain.cancelScheduledValues(now);
        masterGain.gain.setValueAtTime(masterGain.gain.value, now);
        masterGain.gain.linearRampToValueAtTime(muted ? MASTER_VOLUME : 0, now + 1.5);
      }
    }

    canvas.addEventListener('click', toggleAudio);
    canvas.addEventListener('touchstart', (e) => {
      e.preventDefault();
      toggleAudio();
    }, { passive: false });
  </script>
</body>
</html>
